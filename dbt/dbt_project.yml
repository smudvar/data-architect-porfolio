name: 'data_architect_portfolio'
version: '1.0.0'
config-version: 2

profile: 'snowflake_profile'

model-paths:      ["models"]
test-paths:       ["tests"]
macro-paths:      ["macros"]
seed-paths:       ["seeds"]
target-path:      "target"
clean-targets:    ["target", "dbt_packages"]

models:
  data_architect_portfolio:

    # ── Staging layer ─────────────────────────────────────────────
    # Raw source data cleaned & typed; never queried directly by BI
    staging:
      +schema:       staging
      +materialized: view          # always fresh; no storage cost
      +tags:         ["staging"]

    # ── Intermediate layer ────────────────────────────────────────
    # Business logic joins; not exposed to BI tools
    intermediate:
      +schema:       intermediate
      +materialized: ephemeral     # compiled inline; zero Snowflake objects
      +tags:         ["intermediate"]

    # ── Mart layer ────────────────────────────────────────────────
    # Denormalised, analytics-ready tables; BI tools connect here
    marts:
      +schema:       marts
      +tags:         ["marts"]

      core:
        +materialized: table

      product:
        +materialized: incremental
        +incremental_strategy: merge

# ── Snowflake-specific global settings ────────────────────────────
on-run-start:
  - "ALTER SESSION SET QUERY_TAG = 'dbt_run_{{ invocation_id }}';"

on-run-end:
  - "ALTER SESSION UNSET QUERY_TAG;"
